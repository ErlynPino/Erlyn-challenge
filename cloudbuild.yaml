steps:
  # ── Step 1: Build Docker image ────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: Build
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"
      - .

  # ── Step 2: Run tests in parallel (SQLite in-memory, no DB required) ──────────
  - name: "python:3.12-slim"
    id: Test
    waitFor: ["-"]
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt
        export DATABASE_URL="sqlite://"
        pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  # ── Step 3: Run Alembic migrations against production DB ─────────────────────
  - name: "python:3.12-slim"
    id: Migrate
    waitFor:
      - Test
    secretEnv:
      - DATABASE_URL
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt
        alembic upgrade head
  # ── Step 4: Push image to Artifact Registry ───────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: Push
    waitFor:
      - Build
      - Migrate
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"

  # ── Step 5: Deploy to Cloud Run ───────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: Deploy
    waitFor:
      - Push
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - --region
      - $_REGION
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-secrets
      - DATABASE_URL=DATABASE_URL:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"

substitutions:
  _REGION: us-central1
  _REPO: challenge-repo
  _SERVICE: user-api

options:
  logging: CLOUD_LOGGING_ONLY
