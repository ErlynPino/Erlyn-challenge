steps:
  # ── Step 1: Build Docker image ────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: Build
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"
      - .

  # ── Step 2: Run tests (in parallel with Build using a Python base image) ──────
  - name: "python:3.12-slim"
    id: Test
    waitFor: ["-"]   # start immediately, in parallel with Build
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt
        DATABASE_URL="sqlite://" pytest tests/ -v --tb=short \
          --cov=app --cov-report=term-missing

  # ── Step 3: Push image to Artifact Registry ───────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: Push
    waitFor:
      - Build
      - Test
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"

  # ── Step 4: Deploy to Cloud Run ───────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: Deploy
    waitFor:
      - Push
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - --region
      - $_REGION
      - --platform
      - managed
      - --allow-unauthenticated
      - --update-secrets
      - DATABASE_URL=DATABASE_URL:latest   # Secret Manager secret → env var

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"

substitutions:
  _REGION: us-central1
  _REPO: user-management
  _SERVICE: user-management-api

options:
  logging: CLOUD_LOGGING_ONLY
