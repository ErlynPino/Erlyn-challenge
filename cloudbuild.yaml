steps:
  # ── Step 1: Build Docker image ────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: Build
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"
      - .

  # ── Step 2: Run tests in parallel (SQLite in-memory, no DB required) ──────────
  - name: "python:3.12-slim"
    id: Test
    waitFor: ["-"]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        pip install -r requirements.txt
        export DATABASE_URL="sqlite://"
        python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  # ── Step 3: Push image to Artifact Registry ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: Push
    waitFor:
      - Build
      - Test
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"

  # ── Step 4: Deploy to Cloud Run ───────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: Deploy
    waitFor:
      - Push
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        gcloud run deploy $_SERVICE \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA" \
          --region $_REGION \
          --platform managed \
          --no-allow-unauthenticated \
          --set-secrets DATABASE_URL=DATABASE_URL:latest
        gcloud run services add-iam-policy-binding $_SERVICE \
          --region $_REGION \
          --member=allUsers \
          --role=roles/run.invoker || true

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"

substitutions:
  _REGION: us-central1
  _REPO: challenge-repo
  _SERVICE: user-api

options:
  logging: CLOUD_LOGGING_ONLY
